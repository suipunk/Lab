<!DOCTYPE html>
<html lang="uk">
<head>
    <script
            src="https://js-de.sentry-cdn.com/96f31a4b86a218af9d022db8efa9c1dc.min.js"
            crossorigin="anonymous"
    ></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interval Trainer</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div class="trainer-container">
    <h2>🎵 Simple Interval Trainer</h2>
    <p id="app-status" style="font-weight: bold; color: gray;"></p>

    <div class="controls">
        <button id="hint-btn" style="display: none; background-color: #ffc107; color: black; margin-top: 10px;">
            💡 Підказка: Рахуй півтони!
        </button>
        <button id="btn-play">Play New Interval</button>
        <button id="btn-replay" disabled>Replay (r)</button>
    </div>

    <button id="break-btn" style="background-color: red; color: white; margin-top: 10px; padding: 10px;">
        💥 Break the world!
    </button>

    <div id="answer-section" style="display: none;">
        <p>Який це інтервал? (наприклад: P5, m3, M2, TT)</p>
        <input type="text" id="input-answer" placeholder="Введи відповідь...">
        <button id="btn-check">Check</button>
    </div>

    <div id="feedback" class="feedback"></div>

    <div class="score-board">
        <p>Score: <span id="score-correct">0</span> / <span id="score-total">0</span></p>
    </div>
</div>

<script type="module" src="/src/script.js"></script>
</body>
</html>
